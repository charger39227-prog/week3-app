<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Calculator App</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="wrapper">
    <h1 class="app-title">Calculator</h1>
    <div class="calculator">
      <div class="display" id="display">
        <span class="expression" id="expression"></span>
        <span class="result" id="result">0</span>
      </div>
      <div class="buttons">
        <button class="btn btn-clear span-two" onclick="clearAll()">AC</button>
        <button class="btn btn-clear" onclick="deleteLast()">⌫</button>
        <button class="btn btn-operator" onclick="appendVal('/')">÷</button>

        <button class="btn" onclick="appendVal('7')">7</button>
        <button class="btn" onclick="appendVal('8')">8</button>
        <button class="btn" onclick="appendVal('9')">9</button>
        <button class="btn btn-operator" onclick="appendVal('*')">×</button>

        <button class="btn" onclick="appendVal('4')">4</button>
        <button class="btn" onclick="appendVal('5')">5</button>
        <button class="btn" onclick="appendVal('6')">6</button>
        <button class="btn btn-operator" onclick="appendVal('-')">−</button>

        <button class="btn" onclick="appendVal('1')">1</button>
        <button class="btn" onclick="appendVal('2')">2</button>
        <button class="btn" onclick="appendVal('3')">3</button>
        <button class="btn btn-operator" onclick="appendVal('+')">+</button>

        <button class="btn span-two" onclick="appendVal('0')">0</button>
        <button class="btn" onclick="appendVal('.')">.</button>
        <button class="btn btn-equals" onclick="calculate()">=</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
